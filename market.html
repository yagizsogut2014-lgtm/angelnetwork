<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANGEL NW | Market</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

    <header class="main-header" data-aos="fade-down">
        <div class="container mx-auto px-6 grid grid-cols-3 items-center">
            <div class="flex justify-start">
                <div onclick="copyIP()" class="cursor-pointer group bg-white/5 border border-white/10 px-4 py-2 rounded-xl hover:border-blue-500 transition-all">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Sunucu IP</p>
                    <p class="text-sm font-black text-white">angelnetwork.mcsh.io</p>
                </div>
            </div>
            <div class="flex justify-center">
                <a href="index.html" class="hover:scale-105 transition-transform"><img src="logo.png" alt="Logo" class="h-24 drop-shadow-[0_0_20px_rgba(59,130,246,0.5)]"></a>
            </div>
            <nav class="flex justify-end gap-2">
                <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i></a>
                <a href="duyuru.html" class="nav-link"><i class="fa-solid fa-bullhorn"></i></a>
                <a href="market.html" class="nav-link active"><i class="fa-solid fa-gem"></i></a>
                <a href="kurallar.html" class="nav-link"><i class="fa-solid fa-gavel"></i></a>
                <a href="destek.html" class="nav-link"><i class="fa-solid fa-headset"></i></a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-24 pb-20">
        <div class="text-center mb-16" data-aos="fade-up">
            <h2 class="text-6xl font-black italic uppercase tracking-tighter">ANGEL NW <span class="text-blue-500">MARKET</span></h2>
            <p class="text-gray-400 font-bold mt-4 tracking-widest uppercase text-sm">Sunucumuzu Destekle, Ayrıcalıkları Yakala!</p>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass p-8 rounded-[3rem] text-center border-t-4 border-blue-500 flex flex-col justify-between" data-aos="zoom-in">
                <div>
                    <i class="fa-solid fa-crown text-5xl text-blue-500 mb-6"></i>
                    <h3 class="text-2xl font-black italic mb-2 uppercase">VIP ÜYELİK</h3>
                    <p class="text-gray-400 text-sm mb-6">Özel kitler, uçuş yetkisi ve özel tag!</p>
                </div>
                <div class="text-4xl font-black text-white mb-6">150 <span class="text-sm text-blue-500 italic">TL</span></div>
                <button onclick="window.location.href='islem.html?paket=VIP'" class="ANGEL NW-btn w-full justify-center text-lg">SATIN AL</button>
            </div>

            <div class="glass p-8 rounded-[3rem] text-center border-t-4 border-sky-400 flex flex-col justify-between" data-aos="zoom-in" data-aos-delay="100">
                <div>
                    <i class="fa-solid fa-star text-5xl text-sky-400 mb-6"></i>
                    <h3 class="text-2xl font-black italic mb-2 uppercase">MVP PAKET</h3>
                    <p class="text-gray-400 text-sm mb-6">VIP özelliklerine ek, özel particle efektleri!</p>
                </div>
                <div class="text-4xl font-black text-white mb-6">250 <span class="text-sm text-sky-400 italic">TL</span></div>
                <button onclick="window.location.href='islem.html?paket=MVP'" class="ANGEL NW-btn w-full justify-center text-lg">SATIN AL</button>
            </div>

            <div class="glass p-8 rounded-[3rem] text-center border-t-4 border-blue-600 flex flex-col justify-between" data-aos="zoom-in" data-aos-delay="200">
                <div>
                    <i class="fa-solid fa-coins text-5xl text-blue-600 mb-6"></i>
                    <h3 class="text-2xl font-black italic mb-2 uppercase">500 COIN</h3>
                    <p class="text-gray-400 text-sm mb-6">Market içi harcamalar için anında bakiye!</p>
                </div>
                <div class="text-4xl font-black text-white mb-6">50 <span class="text-sm text-blue-600 italic">TL</span></div>
                <button onclick="window.location.href='islem.html?paket=COIN'" class="ANGEL NW-btn w-full justify-center text-lg">SATIN AL</button>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        function copyIP() { navigator.clipboard.writeText("play.valtmc.tr"); alert("IP kopyalandı: play.valtmc.tr"); }
    </script>
</body>
</html>
